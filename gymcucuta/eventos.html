<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos - App Gym Cúcuta</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/eventos.css"/>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="page-content">
    <div class="section-header">
      <h2>📅 Calendario de <span>Eventos</span></h2>
      <button class="btn-primary" onclick="openEvento()">➕ Nuevo Evento</button>
    </div>

    <div class="eventos-layout">
      <!-- CALENDARIO -->
      <div class="card calendario-card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
          <h3 id="calTitle" class="cal-title"></h3>
          <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid-header">
          <span>Dom</span><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- PANEL DERECHO -->
      <div class="eventos-side">
        <div class="card" id="eventosDelDia">
          <div class="card-title">📌 Eventos del Día</div>
          <div id="diaEventos"><p style="color:var(--text-muted);font-size:0.85rem">Selecciona un día en el calendario.</p></div>
        </div>
        <div class="card" style="margin-top:16px">
          <div class="card-title">📋 Todos los Eventos</div>
          <div id="listaEventos"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="eventoModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>📅 Nuevo Evento</h3>
      <div class="form-group"><label>Título del Evento</label><input id="ev_titulo" placeholder="Ej: Clase de Crossfit"/></div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group"><label>Fecha</label><input id="ev_fecha" type="date"/></div>
        <div class="form-group"><label>Hora</label><input id="ev_hora" type="time"/></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group"><label>Tipo</label>
          <select id="ev_tipo">
            <option value="clase">🏋️ Clase</option>
            <option value="evento">🎉 Evento</option>
            <option value="evaluacion">📋 Evaluación</option>
            <option value="mantenimiento">🔧 Mantenimiento</option>
            <option value="otro">📌 Otro</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px"><label>Descripción</label>
        <textarea id="ev_desc" rows="2" placeholder="Detalles del evento..."></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
        <button class="btn-secondary" onclick="closeEvento()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEvento()">💾 Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
