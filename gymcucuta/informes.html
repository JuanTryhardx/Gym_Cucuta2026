<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Informes - App Gym Cúcuta</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/informes.css"/>
</head>
<body>
  <div id="navbar-container"></div>
  <div class="page-content">
    <div class="section-header">
      <h2>📊 <span>Informes</span> y Estadísticas</h2>
      <select id="periodoSelect" class="filtro-select" onchange="renderAll()">
        <option value="mes">Último mes</option>
        <option value="año">Último año</option>
        <option value="todo">Todo</option>
      </select>
    </div>

    <!-- KPIs -->
    <div class="stats-grid" id="kpiGrid"></div>

    <!-- GRAFICAS -->
    <div class="charts-grid">
      <div class="card">
        <div class="card-title">👥 Distribución por Estado</div>
        <div class="chart-wrap"><canvas id="chartEstado"></canvas></div>
        <div id="legendEstado" class="chart-legend"></div>
      </div>
      <div class="card">
        <div class="card-title">📦 Distribución por Plan</div>
        <div class="chart-wrap"><canvas id="chartPlan"></canvas></div>
        <div id="legendPlan" class="chart-legend"></div>
      </div>
      <div class="card chart-wide">
        <div class="card-title">📈 Crecimiento de Miembros</div>
        <div class="chart-wrap-wide"><canvas id="chartCrecimiento"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">🎯 Objetivos de Miembros</div>
        <div class="chart-wrap"><canvas id="chartObjetivos"></canvas></div>
        <div id="legendObjetivos" class="chart-legend"></div>
      </div>
    </div>

    <!-- TABLA DETALLE -->
    <div class="card" style="margin-top:20px">
      <div class="card-title">📋 Detalle de Ingresos por Plan</div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Plan</th><th>Miembros</th><th>Ingreso Total</th><th>% del Total</th></tr></thead>
          <tbody id="tablaPlanes"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/informes.js"></script>
</body>
</html>
