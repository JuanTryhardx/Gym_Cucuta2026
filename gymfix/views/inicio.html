<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio - App Gym Cúcuta</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/inicio.css"/>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-content">

    <!-- HERO BANNER -->
    <section class="hero-banner" id="heroBanner">
      <div class="hero-text">
        <h1>¡Bienvenido a<br><span>App Gym Cúcuta</span>!</h1>
        <p>Tu espacio para alcanzar tus metas físicas con ayuda profesional.</p>
      </div>
      <div class="hero-img">🏋️</div>
    </section>

    <!-- STATS — solo admin/entrenador (controlados por JS) -->
    <section id="statsSection" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
    </section>

    <!-- HOME GRID -->
    <div class="home-grid">

      <!-- Columna Izquierda -->
      <section class="card noticias-card">
        <div class="card-title">
          <span>📢 Noticias y Actualizaciones</span>
          <!-- Botón solo visible para admin/entrenador — controlado por JS -->
          <button id="btnPublicar" class="btn-secondary btn-publicar" style="margin-left:auto;display:none" onclick="openNoticiaModal()">
            ➕ Publicar
          </button>
        </div>
        <div id="noticiasLista"></div>
      </section>

      <!-- Columna Derecha -->
      <aside class="side-col">
        <article class="card">
          <div class="card-title">⚡ Acciones Rápidas</div>
          <div class="quick-actions" id="quickActionsContainer"></div>
        </article>

        <article class="card" style="margin-top:16px">
          <div class="card-title">📅 Próximos Eventos</div>
          <div id="proximosEventos"></div>
        </article>
      </aside>
    </div>

    <!-- SECCIÓN MOTIVACIONAL (solo clientes — controlada por JS) -->
    <div id="clienteMotivacional" style="display:none;margin-top:24px"></div>

  </main>

  <!-- MODAL PUBLICAR (solo admin/entrenador) -->
  <div id="noticiaModal" style="display:none;position:fixed;z-index:3000;inset:0;background:rgba(0,0,0,0.78);align-items:center;justify-content:center;backdrop-filter:blur(5px)">
    <div class="modal-box" style="max-width:560px">
      <h3>📣 Nueva Publicación</h3>
      <form id="formNuevaNoticia" onsubmit="event.preventDefault()">
        <div class="form-group" style="margin-bottom:12px">
          <label>Título *</label>
          <input type="text" id="noticiaTitulo" placeholder="Título de la publicación" required/>
        </div>
        <div class="form-row" style="margin-bottom:12px">
          <div class="form-group">
            <label>Categoría</label>
            <select id="noticiaTipo">
              <option value="Novedad">Novedad</option>
              <option value="Actualización">Actualización</option>
              <option value="Importante">Importante</option>
              <option value="Motivación">Motivación</option>
              <option value="Salud">Salud</option>
            </select>
          </div>
          <div class="form-group">
            <label>URL Imagen (opcional)</label>
            <input type="url" id="noticiaUrlMedia" placeholder="https://..."/>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:18px">
          <label>Contenido *</label>
          <textarea id="noticiaContenido" rows="3" placeholder="Descripción..." required></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeNoticiaModal()">Cancelar</button>
          <button type="button" class="btn-primary" onclick="publicarNoticia()">💾 Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../controllers/InicioController.js"></script>
</body>
</html>
