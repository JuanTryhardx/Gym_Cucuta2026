<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro – App Gym Cúcuta</title>
  <link rel="stylesheet" href="../assets/css/login.css"/>
  <link rel="stylesheet" href="../assets/css/registro.css"/>
  <style>
    /* AJUSTE CRÍTICO PARA EL SCROLL */
    body, html {
        height: auto;
        min-height: 100%;
        overflow-y: auto !important;
    }
    .registro-wrapper {
        padding: 40px 10px; /* Espacio para que el botón no pegue abajo */
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Permite que la tarjeta crezca hacia abajo */
    }
    .registro-card {
        max-height: none !important; /* Quitamos límites de altura */
        height: auto !important;
    }
    .form-scroll {
        overflow: visible !important; /* Evitamos scroll interno doble */
    }
  </style>
</head>
<body>
  <div class="bg-animated">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
  </div>

  <div class="registro-wrapper">
    <div class="registro-card">

      <!-- LOGO -->
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
            <rect x="5"  y="30" width="14" height="20" rx="4" fill="#38bdf8"/>
            <rect x="19" y="34" width="6"  height="12" rx="2" fill="#0ea5e9"/>
            <rect x="25" y="20" width="30" height="40" rx="6" fill="#0284c7"/>
            <rect x="29" y="28" width="22" height="24" rx="4" fill="#38bdf8" opacity="0.3"/>
            <rect x="55" y="34" width="6"  height="12" rx="2" fill="#0ea5e9"/>
            <rect x="61" y="30" width="14" height="20" rx="4" fill="#38bdf8"/>
            <rect x="33" y="35" width="14" height="5"  rx="2" fill="#fff" opacity="0.9"/>
          </svg>
        </div>
        <h1 class="app-title">APP GYM CÚCUTA</h1>
        <p class="app-subtitle">Crear nueva cuenta</p>
      </div>

      <!-- SELECTOR ROL -->
      <div class="rol-selector">
        <button class="rol-btn active" id="btnCliente" onclick="setRol('cliente')">
          <span class="rol-icon">🏋️</span>
          <span class="rol-label">Cliente</span>
          <span class="rol-desc">Acceso inmediato</span>
        </button>
        <button class="rol-btn" id="btnEntrenador" onclick="setRol('entrenador')">
          <span class="rol-icon">🎯</span>
          <span class="rol-label">Entrenador</span>
          <span class="rol-desc">Requiere aprobación</span>
        </button>
      </div>

      <!-- BANNER INFO -->
      <div class="rol-info" id="rolInfo">
        <span id="rolInfoIcon">✅</span>
        <span id="rolInfoText">Tu cuenta se activará de inmediato al registrarte.</span>
      </div>

      <!-- FORMULARIO -->
      <div class="form-scroll">

        <div class="form-section-title">Datos personales</div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Nombre completo *</label>
            <input type="text" id="reg_nombre" placeholder="Tu nombre completo"/>
          </div>
          <div class="form-group">
            <label>Documento *</label>
            <input type="text" id="reg_documento" placeholder="Cédula o ID"/>
          </div>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="reg_email" placeholder="tucorreo@email.com"/>
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="reg_telefono" placeholder="3001234567"/>
          </div>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Fecha de nacimiento</label>
            <input type="date" id="reg_nacimiento"/>
          </div>
          <div class="form-group">
            <label>Género</label>
            <select id="reg_genero">
              <option value="">— Seleccionar —</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <div class="form-section-title" style="margin-top:20px">Credenciales de acceso</div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Contraseña *</label>
            <div class="pass-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg_password" placeholder="Mínimo 6 caracteres" oninput="checkPasswordStrength()"/>
              <button type="button" class="toggle-pass" onclick="togglePassReg('reg_password', this)">👁</button>
            </div>
            <div class="pass-strength-bar-wrap">
              <div class="pass-strength-bar" id="passStrengthBar"></div>
            </div>
            <span class="pass-strength-txt" id="passStrengthText"></span>
          </div>
          <div class="form-group">
            <label>Confirmar contraseña *</label>
            <div class="pass-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg_password_confirm" placeholder="Repite tu contraseña"/>
              <button type="button" class="toggle-pass" onclick="togglePassReg('reg_password_confirm', this)">👁</button>
            </div>
          </div>
        </div>

        <!-- Solo entrenador -->
        <div id="seccionEntrenador" style="display:none">
          <div class="form-section-title" style="margin-top:20px">Datos profesionales</div>
          <div class="form-group">
            <label>Especialidad *</label>
            <input type="text" id="reg_especialidad" placeholder="Ej: Musculación, Cardio..."/>
          </div>
        </div>

        <!-- Error -->
        <div id="errorMsgReg" class="error-msg" style="display:none; margin-top:14px">
          ⚠️ <span id="errorMsgText">Error</span>
        </div>

        <button class="btn-login" id="btnRegistrar" style="margin-top:22px" onclick="registrarUsuario()">
          CREAR CUENTA
        </button>

        <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted)">
          ¿Ya tienes cuenta? <a href="index.html" style="color:#38bdf8;text-decoration:none;font-weight:700">Iniciar sesión →</a>
        </p>
      </div>
    </div>
  </div>

  <div id="modalExito" class="modal-exito" style="display:none">
    <div class="modal-exito-card">
      <div class="modal-exito-icon" id="exitoIcon">✅</div>
      <h2 id="exitoTitulo">¡Registro exitoso!</h2>
      <p id="exitoMensaje">Tu cuenta ha sido creada correctamente.</p>
      <button class="btn-login" style="margin-top:24px;width:100%" onclick="window.location.href='index.html'">
        Iniciar sesión →
      </button>
    </div>
  </div>

  <script type="module" src="../controllers/registro.js"></script>
</body>
</html>
