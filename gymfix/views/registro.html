<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro – App Gym Cúcuta</title>
  <link rel="stylesheet" href="../assets/css/login.css"/>
  <link rel="stylesheet" href="../assets/css/registro.css"/>
  <style>
    /* ============================================================
       FIX CRÍTICO: ELIMINACIÓN DE DOBLE SCROLL Y UNIFICACIÓN AZUL
       ============================================================ */
    :root {
      --blue-main: #3b82f6;
      --bg-dark-card: #1f2937;
      --border-soft: rgba(255, 255, 255, 0.08);
    }
    
    /* Forzamos a que solo el documento global maneje el scroll vertical */
    html, body {
        height: auto;
        min-height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0b0f19;
        overflow-y: auto !important; 
        overflow-x: hidden;
    }
    
    /* El wrapper no debe aislar el scroll ni generar contenedores dobles */
    .registro-wrapper {
        padding: 40px 15px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        box-sizing: border-box;
    }
    
    .registro-card {
        background-color: var(--bg-dark-card);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 30px;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        height: auto !important;
        max-height: none !important;
    }
    
    /* Eliminamos el scroll interno de este div que duplicaba la barra */
    .form-scroll {
        overflow: visible !important; 
        height: auto !important;
        max-height: none !important;
    }
    
    .rol-selector {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
    }
    
    .rol-btn {
        flex: 1;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border-soft);
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: all 0.2s;
    }
    
    .rol-btn.active {
        border-color: var(--blue-main);
        background: rgba(59, 130, 246, 0.08);
    }
    
    .rol-label {
        font-weight: 600;
        font-size: 0.95rem;
    }
    
    .rol-desc {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 2px;
    }
    
    .rol-info {
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-soft);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #e5e7eb;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
  </style>
</head>
<body>
  
  <div class="bg-animated">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
  </div>

  <div class="registro-wrapper">
    <section class="registro-card">

      <!-- LOGO -->
      <header class="logo-section" style="text-align: center; margin-bottom: 24px;">
        <div class="logo-icon" style="margin-bottom: 12px; display: inline-block;">
          <svg viewBox="0 0 80 80" xmlns="http://w3.org" width="50" height="50">
            <rect x="5"  y="30" width="14" height="20" rx="4" fill="#3b82f6"/>
            <rect x="19" y="34" width="6"  height="12" rx="2" fill="#2563eb"/>
            <rect x="25" y="20" width="30" height="40" rx="6" fill="#1d4ed8"/>
            <rect x="29" y="28" width="22" height="24" rx="4" fill="#3b82f6" opacity="0.3"/>
            <rect x="55" y="34" width="6"  height="12" rx="2" fill="#2563eb"/>
            <rect x="61" y="30" width="14" height="20" rx="4" fill="#3b82f6"/>
            <rect x="33" y="35" width="14" height="5"  rx="2" fill="#fff" opacity="0.9"/>
          </svg>
        </div>
        <h1 class="app-title" style="font-size: 1.5rem; font-weight: 700; color: #fff; margin: 0;">APP GYM CÚCUTA</h1>
        <p class="app-subtitle" style="font-size: 0.9rem; color: #9ca3af; margin: 4px 0 0 0;">Crear nueva cuenta</p>
      </header>

      <!-- SELECTOR ROL -->
      <nav class="rol-selector">
        <button type="button" class="rol-btn active" id="btnCliente" onclick="setRol('cliente')">
          <span class="rol-label">Cliente</span>
          <span class="rol-desc">Acceso inmediato</span>
        </button>
        <button type="button" class="rol-btn" id="btnEntrenador" onclick="setRol('entrenador')">
          <span class="rol-label">Entrenador</span>
          <span class="rol-desc">Requiere aprobación</span>
        </button>
      </nav>

      <!-- BANNER INFO -->
      <div class="rol-info" id="rolInfo">
        <span id="rolInfoText">Tu cuenta se activará de inmediato al registrarte.</span>
      </div>

      <!-- FORMULARIO -->
      <form class="form-scroll" id="formAutoregistro" onsubmit="event.preventDefault();">

        <div class="form-section-title" style="font-size: 0.85rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Datos personales</div>
        
        <div class="form-row-2">
          <div class="form-group"><label>Nombre completo *</label><input type="text" id="reg_nombre" placeholder="Tu nombre completo" required/></div>
          <div class="form-group"><label>Documento *</label><input type="text" id="reg_documento" placeholder="Cédula o ID" required/></div>
        </div>
        
        <div class="form-row-2">
          <div class="form-group"><label>Email *</label><input type="email" id="reg_email" placeholder="tucorreo@email.com" required/></div>
          <div class="form-group"><label>Teléfono</label><input type="tel" id="reg_telefono" placeholder="3001234567"/></div>
        </div>
        
        <div class="form-row-2">
          <div class="form-group"><label>Fecha de nacimiento</label><input type="date" id="reg_nacimiento"/></div>
          <div class="form-group"><label>Género</label>
            <select id="reg_genero">
              <option value="">— Seleccionar —</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
        </div>

        <div class="form-section-title" style="font-size: 0.85rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 12px 0;">Credenciales de acceso</div>
        
        <div class="form-row-2">
          <div class="form-group">
            <label>Contraseña *</label>
            <div class="pass-wrapper" style="position: relative;">
              <input type="password" id="reg_password" placeholder="Mínimo 6 caracteres" oninput="checkPasswordStrength()" required style="width: 100%; padding-right: 40px;"/>
              <button type="button" class="toggle-pass" onclick="togglePassReg('reg_password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer;">👁</button>
            </div>
            <div class="pass-strength-bar-wrap" style="background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; margin-top: 6px; overflow: hidden;">
              <div class="pass-strength-bar" id="passStrengthBar" style="height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
            <span class="pass-strength-txt" id="passStrengthText" style="font-size: 0.75rem; margin-top: 4px; display: block;"></span>
          </div>
          
          <div class="form-group">
            <label>Confirmar contraseña *</label>
            <div class="pass-wrapper" style="position: relative;">
              <input type="password" id="reg_password_confirm" placeholder="Repite tu contraseña" required style="width: 100%; padding-right: 40px;"/>
              <button type="button" class="toggle-pass" onclick="togglePassReg('reg_password_confirm', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer;">👁</button>
            </div>
          </div>
        </div>

        <!-- 🔥 FIX DATOS PROFESIONALES: Oculto por defecto de forma correcta para el JS -->
        <div id="seccionEntrenador" style="display: none;">
          <div class="form-section-title" style="font-size: 0.85rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 12px 0;">Datos profesionales</div>
          <div class="form-group">
            <label>Especialidad *</label>
            <input type="text" id="reg_especialidad" placeholder="Ej: Musculación, Cardio..."/>
          </div>
        </div>

        <!-- Alertas de Error -->
        <div id="errorMsgReg" class="error-msg" style="display:none; margin-top:14px; padding: 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; color: #ef4444; font-size: 0.85rem;">
          <span id="errorMsgText">Error</span>
        </div>

        <button type="button" class="btn-login" id="btnRegistrar" style="margin-top:22px; width: 100%; background: #3b82f6; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem;" onclick="registrarUsuario()">
          CREAR CUENTA
        </button>

        <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:#9ca3af;">
          ¿Ya tienes cuenta? <a href="index.html" style="color:#3b82f6; text-decoration:none; font-weight:700;">Iniciar sesión →</a>
        </p>
      </form>
    </section>
  </div>

  <!-- MODAL DE ÉXITO -->
  <div id="modalExito" class="modal-exito" style="display:none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
    <div class="modal-exito-card" style="background: var(--bg-dark-card); border: 1px solid var(--border-soft); padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px;">
      <h2 id="exitoTitulo" style="color: #fff; margin-bottom: 8px; font-size: 1.4rem;">¡Registro exitoso!</h2>
      <p id="exitoMensaje" style="color: #9ca3af; font-size: 0.9rem; margin: 0;">Tu cuenta ha sido creada correctamente.</p>
      <button type="button" class="btn-login" style="margin-top:24px; width:100%; background: #3b82f6; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;" onclick="window.location.href='index.html'">
        Iniciar sesión →
      </button>
    </div>
  </div>

  <script type="module" src="../controllers/registro.js"></script>
</body>
</html>
