<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validaciones - App Gym Cúcuta</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/validaciones.css">
  <!-- Iconos vectoriales para replicar los glifos de tu Figma -->
  <link rel="stylesheet" href="https://cloudflare.com"/>
</head>
<body>

  <!-- Contenedor dinámico de la barra de navegación -->
  <div id="navbar-container"></div>

  <div class="page-content">

    <!-- HEADER LIMPIO SIN EMOJIS -->
    <header class="section-header" style="margin-bottom: 8px;">
      <h2 style="font-size: 1.8rem; font-weight: 700; color: #fff;">Validaciones <span style="color: #3b82f6;">de Entrenadores</span></h2>
      <span id="contador-badge" class="val-badge"></span>
    </header>
    <p style="color: #9ca3af; font-size: 0.95rem; margin-top: 0; margin-bottom: 24px;">Revisa y aprueba las solicitudes de entrenadores que desean unirse al equipo.</p>

    <!-- STATS ROW (Replicando los 3 bloques superiores de tu Figma) -->
    <section class="val-stats">
      <div class="val-stat-card pendiente">
        <div>
          <div class="val-stat-label" style="color: #f59e0b;">Pendientes</div>
          <div class="val-stat-num" id="stat-pendientes">—</div>
        </div>
      </div>
      <div class="val-stat-card aprobado">
        <div>
          <div class="val-stat-label" style="color: #10b981;">Aprobadas</div>
          <div class="val-stat-num" id="stat-aprobados">—</div>
        </div>
      </div>
      <div class="val-stat-card rechazado">
        <div>
          <div class="val-stat-label" style="color: #ef4444;">Rechazadas</div>
          <div class="val-stat-num" id="stat-rechazados">—</div>
        </div>
      </div>
    </section>

    <!-- FILTRO TABS EN TONOS AZULES Y GRISES SUTILES -->
    <nav class="val-tabs" style="margin-bottom: 20px;">
      <button class="val-tab active" data-filter="pendiente" onclick="setFiltro('pendiente')">Pendientes</button>
      <button class="val-tab" data-filter="aprobado" onclick="setFiltro('aprobado')">Aprobadas</button>
      <button class="val-tab" data-filter="rechazado" onclick="setFiltro('rechazado')">Rechazadas</button>
    </nav>

    <!-- CONTENEDOR PRINCIPAL: Reemplazamos la tabla rígida por el contenedor de Tarjetas de tu Figma -->
    <div id="countLabel" class="count-label" style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 12px; font-weight: 500;"></div>
    
    <!-- Aquí es donde tu JavaScript inyectará dinámicamente cada tarjeta de entrenador -->
    <section id="contenedor-tarjetas-validaciones" class="cards-container-layout">
      <!-- El loader inicial se adapta al estilo -->
      <div class="val-loading" style="color: #9ca3af; padding: 30px; text-align: center; width: 100%;">
        <i class="fas fa-spinner fa-spin" style="margin-right: 8px; color: #3b82f6;"></i> Cargando solicitudes...
      </div>
    </section>

    <!-- Mensaje de lista vacía unificado -->
    <div id="emptyMsg" class="empty-msg" style="display:none; text-align: center; padding: 40px; color: #9ca3af; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;">
      No hay solicitudes en esta categoría.
    </div>

  </div>

  <!-- MODAL DETALLE DE RESPALDO (Mantiene tu lógica por si das clic a expandir información) -->
  <div id="detalleModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:480px; background: #1f2937; border: 1px solid rgba(255,255,255,0.08); padding: 24px; border-radius: 12px;">
      <h3 style="color: #fff; margin-bottom: 16px;">Detalle de Solicitud</h3>
      <div id="detalle-content" class="detalle-grid" style="color: #e5e7eb;"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px">
        <button class="btn-secondary" onclick="closeDetalle()">Cerrar</button>
        <button class="btn-val-rechazar" id="btn-rechazar-modal" style="background: #ef4444; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Rechazar</button>
        <button class="btn-val-aprobar" id="btn-aprobar-modal" style="background: #3b82f6; color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Aprobar</button>
      </div>
    </div>
  </div>

  <!-- Disparador de lógica del módulo -->
  <script type="module" src="../controllers/validaciones.js"></script>
</body>
</html>
