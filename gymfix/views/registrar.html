<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrar Persona - App Gym Cúcuta</title>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/registrar.css"/>
</head>
<body>
  
  <!-- Contenedor de navegación común -->
  <div id="navbar-container"></div>
  
  <main class="page-content">
    
    <!-- Encabezado unificado de sección -->
    <header class="section-header" style="margin-bottom: 24px;">
      <h2 style="font-size: 1.8rem; font-weight: 700; color: #fff;">Registrar <span style="color: #3b82f6;">Persona</span></h2>
    </header>

    <div class="reg-layout">
      
      <!-- Bloque de Formulario Principal -->
      <section class="card form-card">
        <div class="card-title" style="font-size: 1.1rem; font-weight: 600; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 12px; margin-bottom: 20px;">
          Datos del Nuevo Miembro
        </div>

        <form id="formRegistrarPersona" onsubmit="event.preventDefault();">
          
          <!-- Bloque: Información Personal -->
          <fieldset style="border: none; padding: 0; margin-bottom: 24px;">
            <legend class="form-section-title" style="font-size: 0.9rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;">Información Personal</legend>
            <div class="form-row">
              <div class="form-group"><label>Nombre Completo *</label><input id="r_nombre" placeholder="Ej: Juan García" required/></div>
              <div class="form-group"><label>Documento de Identidad *</label><input id="r_documento" placeholder="Cédula o ID" required/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Fecha de Nacimiento</label><input id="r_nacimiento" type="date"/></div>
              <div class="form-group"><label>Género</label>
                <select id="r_genero"><option>Masculino</option><option>Femenino</option><option>Otro</option></select>
              </div>
              <div class="form-group"><label>Teléfono</label><input id="r_telefono" placeholder="+57 300 000 0000"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Correo Electrónico</label><input id="r_email" type="email" placeholder="correo@email.com"/></div>
              <div class="form-group"><label>Dirección</label><input id="r_direccion" placeholder="Barrio, ciudad"/></div>
            </div>
          </fieldset>

          <!-- Bloque: Información del Plan -->
          <fieldset style="border: none; padding: 0; margin-bottom: 24px;">
            <legend class="form-section-title" style="font-size: 0.9rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;">Información del Plan</legend>
            <div class="form-row">
              <div class="form-group"><label>Plan / Membresía *</label>
                <select id="r_plan" required>
                  <option value="1">Mensual</option>
                  <option value="2">Trimestral</option>
                  <option value="3">Semestral</option>
                  <option value="4">Anual</option>
                </select>
              </div>
              <div class="form-group"><label>Mensualidad (COP) *</label><input id="r_mensualidad" type="number" placeholder="0" required/></div>
              <div class="form-group"><label>Fecha de Inicio</label><input id="r_inicio" type="date"/></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Entrenador Asignado</label><input id="r_entrenador" placeholder="Nombre del entrenador"/></div>
              <div class="form-group"><label>Objetivo</label>
                <select id="r_objetivo">
                  <option>Pérdida de peso</option><option>Ganancia muscular</option><option>Mantenimiento</option><option>Resistencia</option><option>Rehabilitación</option><option>General</option>
                </select>
              </div>
              <div class="form-group"><label>Estado</label>
                <select id="r_estado"><option value="Activo">Activo</option><option value="Inactivo">Inactivo</option><option value="Pendiente">Pendiente</option></select>
              </div>
            </div>
          </fieldset>

          <!-- Bloque: Información de Salud -->
          <fieldset style="border: none; padding: 0; margin-bottom: 24px;">
            <legend class="form-section-title" style="font-size: 0.9rem; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px;">Información de Salud</legend>
            <div class="form-row">
              <div class="form-group"><label>Peso (kg)</label><input id="r_peso" type="number" placeholder="70"/></div>
              <div class="form-group"><label>Altura (cm)</label><input id="r_altura" type="number" placeholder="170"/></div>
              <div class="form-group"><label>Contacto de Emergencia</label><input id="r_emergencia" placeholder="Nombre y teléfono"/></div>
            </div>
            <div class="form-row">
              <div class="form-group" style="min-width:100%"><label>Condiciones Médicas / Observaciones</label>
                <textarea id="r_obs" rows="2" placeholder="Alergias, lesiones, medicamentos..."></textarea>
              </div>
            </div>
          </fieldset>

          <!-- Botones de Acción Estilizados en tonos neutros y azul -->
          <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
            <button type="button" class="btn-secondary" onclick="limpiarForm()" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 6px; cursor: pointer;">Limpiar</button>
            <button type="button" class="btn-primary" onclick="registrarPersona()" style="background: #3b82f6; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer;">Registrar Miembro</button>
          </div>
        </form>
      </section>

      <!-- Panel Lateral Derecho (Estadísticas y Últimos Registrados) -->
      <aside class="side-panel">
        <div class="card" style="margin-bottom: 16px;">
          <div class="card-title" style="font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 14px;">Estadísticas</div>
          <div id="regStats"></div>
        </div>
        <div class="card">
          <div class="card-title" style="font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 14px;">Últimos Registrados</div>
          <div id="ultimosReg"></div>
        </div>
      </aside>
      
    </div>
  </main>

  <script type="module" src="../controllers/registrar.js"></script>
  
</body>
</html>
