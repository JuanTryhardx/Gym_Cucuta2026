<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personas - App Gym Cúcuta</title>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jsPDF + AutoTable para exportar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- SheetJS para exportar Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="../assets/css/personas.css"/>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <div class="page-content">

    <!-- HEADER -->
    <div class="section-header">
      <div>
        <h2>Personas <span>Registradas</span></h2>
        <p class="section-sub">Gestiona todos los miembros del gimnasio</p>
      </div>
      <div class="header-actions">
        <button id="btnExportPDF"   class="btn-export btn-pdf">Exportar PDF</button>
        <button id="btnExportExcel" class="btn-export btn-excel">Exportar Excel</button>
        <a href="registrar.html" class="btn-primary"> Nuevo Miembro</a>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="card filtros-bar">
      <input id="buscar" class="buscar-input" placeholder="Buscar por nombre, documento o email..."/>
      <select id="filtroEstado" class="filtro-select">
        <option value="">Todos los estados</option>
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
        <option value="Pendiente">Pendiente</option>
      </select>
    </div>

    <!-- TABLA -->
    <div class="card table-card">
      <div class="table-topbar">
        <div id="countLabel" class="count-label"></div>
      </div>

      <div class="table-wrapper">
        <table id="tablaPersonasEl">
          <thead>
            <tr>
              <th>Miembro</th>
              <th>Documento</th>
              <th>Teléfono</th>
              <th>Plan</th>
              <th>Mensualidad</th>
              <th>Inicio</th>
              <th>Días Restantes</th> <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaPersonas"></tbody>
        </table>
      </div>

      <div id="emptyMsg" class="empty-msg" style="display:none">
        <div class="empty-icon"></div>
        <p>No se encontraron miembros</p>
        <small>Intenta con otro término de búsqueda</small>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR -->
  <div id="editModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:660px">
      <h3> Editar Miembro</h3>
      <input type="hidden" id="e_id"/>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input id="e_nombre" placeholder="Nombre completo"/>
        </div>
        <div class="form-group">
          <label>Documento</label>
          <input id="e_documento" placeholder="Número de documento"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Teléfono</label>
          <input id="e_telefono" placeholder="Teléfono de contacto"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="e_email" placeholder="correo@ejemplo.com"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Plan</label>
          <select id="e_plan">
            <option value="1">Mensual</option>
            <option value="2">Trimestral</option>
            <option value="3">Semestral</option>
            <option value="4">Anual</option>
          </select>
        </div>
        <div class="form-group">
          <label>Mensualidad ($)</label>
          <input id="e_mensualidad" type="number" placeholder="0"/>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="e_estado">
            <option>Activo</option>
            <option>Inactivo</option>
            <option>Pendiente</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Objetivo</label>
          <select id="e_objetivo">
            <option>Pérdida de peso</option>
            <option>Ganancia muscular</option>
            <option>Mantenimiento</option>
            <option>Resistencia</option>
            <option>Rehabilitación</option>
            <option>General</option>
          </select>
        </div>
        <div class="form-group">
          <label>Entrenador</label>
          <input id="e_entrenador" placeholder="Nombre del entrenador"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Peso (kg)</label>
          <input id="e_peso" type="number" placeholder="70"/>
        </div>
        <div class="form-group">
          <label>Altura (cm)</label>
          <input id="e_altura" type="number" placeholder="170"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="min-width:100%">
          <label>Observaciones</label>
          <textarea id="e_obs" rows="2" placeholder="Notas adicionales..."></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEdicion()"> Guardar Cambios</button>
      </div>
    </div>
  </div>

  <script type="module" src="../controllers/personas.js"></script>
</body>
</html>
