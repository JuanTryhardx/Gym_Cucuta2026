<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personas - App Gym Cúcuta</title>

  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/personas.css"/>
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <div class="page-content">

    <!-- HEADER -->
    <div class="section-header">
      <h2>👥 Personas <span>Registradas</span></h2>
      <a href="registrar.html" class="btn-primary">➕ Nuevo Miembro</a>
    </div>

    <!-- FILTROS (OPCIONAL PARA FUTURO) -->
    <div class="card filtros-bar">
      <input id="buscar" class="buscar-input" placeholder="🔍 Buscar por nombre o documento..." />
    </div>

    <!-- TABLA -->
    <div class="card">

      <div id="countLabel" class="count-label"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Miembro</th>
              <th>Documento</th>
              <th>Teléfono</th>
              <th>Plan</th>
              <th>Mensualidad</th>
              <th>Inicio</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaPersonas"></tbody>
        </table>
      </div>

      <div id="emptyMsg" class="empty-msg" style="display:none">
        😔 No hay miembros registrados
      </div>

    </div>
  </div>

  <!-- ========================= -->
  <!-- MODAL EDITAR -->
  <!-- ========================= -->

  <div id="editModal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:650px">

      <h3>✏️ Editar Miembro</h3>

      <!-- ID OCULTO -->
      <input type="hidden" id="e_id"/>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input id="e_nombre"/>
        </div>

        <div class="form-group">
          <label>Documento</label>
          <input id="e_documento"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Teléfono</label>
          <input id="e_telefono"/>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input id="e_email"/>
        </div>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Plan</label>
          <!-- 🔥 CORREGIDO -->
          <select id="e_plan">
            <option value="1">Mensual</option>
            <option value="2">Trimestral</option>
            <option value="3">Semestral</option>
            <option value="4">Anual</option>
          </select>
        </div>

        <div class="form-group">
          <label>Mensualidad</label>
          <input id="e_mensualidad" type="number"/>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select id="e_estado">
            <option>Activo</option>
            <option>Inactivo</option>
            <option>Pendiente</option>
          </select>
        </div>

      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Objetivo</label>
          <select id="e_objetivo">
            <option>Pérdida de peso</option>
            <option>Ganancia muscular</option>
            <option>Mantenimiento</option>
            <option>Resistencia</option>
            <option>Rehabilitación</option>
            <option>General</option>
          </select>
        </div>

        <div class="form-group">
          <label>Entrenador</label>
          <input id="e_entrenador"/>
        </div>

      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Peso (kg)</label>
          <input id="e_peso" type="number"/>
        </div>

        <div class="form-group">
          <label>Altura (cm)</label>
          <input id="e_altura" type="number"/>
        </div>

      </div>

      <div class="form-row">
        <div class="form-group" style="min-width:100%">
          <label>Observaciones</label>
          <textarea id="e_obs" rows="2"></textarea>
        </div>
      </div>

      <!-- BOTONES -->
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px">
        <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEdicion()">💾 Guardar</button>
      </div>

    </div>
  </div>
  <!-- JS -->
  <script type="module" src="js/personas.js"></script>

</body>
</html>
